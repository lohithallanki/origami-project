<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login | origami.we</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{ margin:0; padding:0; box-sizing:border-box; }

:root{
  --yellow:#ffeb00;
  --violet:#6a5acd;
  --violet-dark:#4b3cc4;
  --white:#fff;
  --text:#1a1a2e;
  --muted:#666;
  --error:#e53e3e;
  --success:#38a169;
}

body{
  font-family:'DM Sans', sans-serif;
  background: var(--yellow);
  min-height:100vh;
  display:grid;
  place-items:center;
  padding:20px;
}

.card{
  background:#fff;
  border-radius:28px;
  padding:48px 44px;
  width:min(460px, 100%);
  box-shadow: 0 30px 80px rgba(106,90,205,0.2), 0 0 0 1px rgba(106,90,205,0.08);
  animation: rise 0.5s ease;
}

@keyframes rise{
  from{ opacity:0; transform:translateY(20px); }
  to{ opacity:1; transform:translateY(0); }
}

.logo{
  display:flex;
  align-items:center;
  gap:10px;
  margin-bottom:32px;
}

.logo-dot{
  width:36px; height:36px;
  background:var(--violet);
  border-radius:50%;
  display:grid; place-items:center;
  font-size:18px;
}

.logo span{
  font-family:'Playfair Display', serif;
  font-size:1.5rem;
  color:var(--violet);
  font-weight:700;
}

h1{
  font-family:'Playfair Display', serif;
  font-size:2rem;
  color:var(--text);
  margin-bottom:6px;
}

.subtitle{
  color:var(--muted);
  font-size:0.95rem;
  margin-bottom:30px;
}

/* TABS */
.tabs{
  display:flex;
  background:#f5f5ff;
  border-radius:12px;
  padding:4px;
  margin-bottom:28px;
}

.tab{
  flex:1;
  padding:10px;
  text-align:center;
  border:none;
  background:transparent;
  border-radius:9px;
  font-family:'DM Sans',sans-serif;
  font-size:0.95rem;
  font-weight:600;
  cursor:pointer;
  color:var(--muted);
  transition:all 0.25s;
}

.tab.active{
  background:var(--violet);
  color:#fff;
  box-shadow:0 4px 12px rgba(106,90,205,0.35);
}

/* FORM */
.form-group{
  margin-bottom:18px;
}

label{
  display:block;
  font-size:0.85rem;
  font-weight:600;
  color:var(--text);
  margin-bottom:7px;
  letter-spacing:0.02em;
  text-transform:uppercase;
}

input{
  width:100%;
  padding:13px 16px;
  border:2px solid #e8e8f0;
  border-radius:12px;
  font-family:'DM Sans',sans-serif;
  font-size:1rem;
  color:var(--text);
  background:#fafafa;
  transition:border-color 0.2s, box-shadow 0.2s;
  outline:none;
}

input:focus{
  border-color:var(--violet);
  box-shadow:0 0 0 4px rgba(106,90,205,0.12);
  background:#fff;
}

.btn{
  width:100%;
  padding:14px;
  background:var(--violet);
  color:#fff;
  border:none;
  border-radius:12px;
  font-family:'DM Sans',sans-serif;
  font-size:1rem;
  font-weight:700;
  cursor:pointer;
  margin-top:8px;
  transition:background 0.2s, transform 0.15s, box-shadow 0.2s;
  letter-spacing:0.02em;
}

.btn:hover{
  background:var(--violet-dark);
  transform:translateY(-1px);
  box-shadow:0 8px 24px rgba(106,90,205,0.35);
}

.btn:active{ transform:translateY(0); }

.btn:disabled{
  opacity:0.6;
  cursor:not-allowed;
  transform:none;
}

.alert{
  padding:12px 16px;
  border-radius:10px;
  font-size:0.9rem;
  font-weight:500;
  margin-top:16px;
  display:none;
}

.alert.error{ background:#fff0f0; color:var(--error); border:1px solid #ffc5c5; }
.alert.success{ background:#f0fff4; color:var(--success); border:1px solid #9ae6b4; }
.alert.show{ display:block; animation:fade 0.3s ease; }

@keyframes fade{ from{ opacity:0; } to{ opacity:1; } }

.back-link{
  display:block;
  text-align:center;
  margin-top:20px;
  color:var(--muted);
  font-size:0.9rem;
  text-decoration:none;
}

.back-link:hover{ color:var(--violet); }

/* Panel visibility */
#registerPanel{ display:none; }
</style>
</head>
<body>

<div class="card">
  <div class="logo">
    <div class="logo-dot">🌸</div>
    <span>origami.we</span>
  </div>

  <h1>Welcome back</h1>
  <p class="subtitle">Sign in to your origami account</p>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('login')">Sign In</button>
    <button class="tab" onclick="switchTab('register')">Register</button>
  </div>

  <!-- LOGIN -->
  <div id="loginPanel">
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="loginEmail" placeholder="you@example.com" autocomplete="email">
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="loginPassword" placeholder="••••••••" autocomplete="current-password">
    </div>
    <button class="btn" id="loginBtn" onclick="doLogin()">Sign In</button>
    <div class="alert" id="loginAlert"></div>
  </div>

  <!-- REGISTER -->
  <div id="registerPanel">
    <div class="form-group">
      <label>Full Name</label>
      <input type="text" id="regName" placeholder="Your name">
    </div>
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="regEmail" placeholder="you@example.com">
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="regPassword" placeholder="At least 6 characters">
    </div>
    <button class="btn" id="registerBtn" onclick="doRegister()">Create Account</button>
    <div class="alert" id="registerAlert"></div>
  </div>

  <a href="index.html" class="back-link">← Back to home</a>
</div>

<script>
const API = 'http://localhost:3000/api';

function switchTab(tab) {
  document.getElementById('loginPanel').style.display = tab === 'login' ? 'block' : 'none';
  document.getElementById('registerPanel').style.display = tab === 'register' ? 'block' : 'none';
  document.querySelectorAll('.tab').forEach((t, i) => {
    t.classList.toggle('active', (i === 0) === (tab === 'login'));
  });
}

function showAlert(id, msg, type) {
  const el = document.getElementById(id);
  el.textContent = msg;
  el.className = `alert ${type} show`;
}

async function doLogin() {
  const email = document.getElementById('loginEmail').value.trim();
  const password = document.getElementById('loginPassword').value;
  if (!email || !password) return showAlert('loginAlert', 'Please fill in all fields.', 'error');

  const btn = document.getElementById('loginBtn');
  btn.disabled = true; btn.textContent = 'Signing in…';

  try {
    const res = await fetch(`${API}/login`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error);

    localStorage.setItem('origami_token', data.token);
    localStorage.setItem('origami_user', JSON.stringify(data.user));
    showAlert('loginAlert', `Welcome back, ${data.user.name}! Redirecting…`, 'success');
    setTimeout(() => window.location.href = 'index.html', 1200);
  } catch(e) {
    showAlert('loginAlert', e.message || 'Something went wrong.', 'error');
    btn.disabled = false; btn.textContent = 'Sign In';
  }
}

async function doRegister() {
  const name = document.getElementById('regName').value.trim();
  const email = document.getElementById('regEmail').value.trim();
  const password = document.getElementById('regPassword').value;
  if (!name || !email || !password) return showAlert('registerAlert', 'Please fill in all fields.', 'error');
  if (password.length < 6) return showAlert('registerAlert', 'Password must be at least 6 characters.', 'error');

  const btn = document.getElementById('registerBtn');
  btn.disabled = true; btn.textContent = 'Creating account…';

  try {
    const res = await fetch(`${API}/register`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, email, password })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error);

    localStorage.setItem('origami_token', data.token);
    localStorage.setItem('origami_user', JSON.stringify(data.user));
    showAlert('registerAlert', `Account created! Welcome, ${data.user.name}! Redirecting…`, 'success');
    setTimeout(() => window.location.href = 'index.html', 1200);
  } catch(e) {
    showAlert('registerAlert', e.message || 'Something went wrong.', 'error');
    btn.disabled = false; btn.textContent = 'Create Account';
  }
}

// Allow Enter key
document.addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    if (document.getElementById('loginPanel').style.display !== 'none') doLogin();
    else doRegister();
  }
});
</script>
</body>
</html>
